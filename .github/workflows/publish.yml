name: Publish to crates.io

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test --release

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Read local version
        id: local
        run: |
          V=$(grep -m1 -oE '^version\s*=\s*"[^"]+"' Cargo.toml | grep -oE '"[^"]+"' | tr -d '"')
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Check if version already on crates.io
        id: gate
        run: |
          set +e
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://crates.io/api/v1/crates/onql-client/${{ steps.local.outputs.version }}")
          if [ "$STATUS" = "200" ]; then
            echo "already=true"  >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify package
        if: steps.gate.outputs.already == 'false'
        run: cargo package

      - name: Publish to crates.io
        if: steps.gate.outputs.already == 'false'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
